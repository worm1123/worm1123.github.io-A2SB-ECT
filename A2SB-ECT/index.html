<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Audio Super-Resolution Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --card:      #1a1a26;
    --border:    #2a2a40;
    --accent:    #7c6af7;
    --accent2:   #f76a8a;
    --text:      #e8e8f0;
    --muted:     #7070a0;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    padding: 72px 48px 48px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    top: -120px; left: -80px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,106,247,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  h1 span { color: var(--accent); }
  .header-desc {
    font-size: 16px;
    color: var(--muted);
    max-width: 640px;
    line-height: 1.7;
    font-weight: 400;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 24px 48px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── SAMPLE COUNTER ── */
  .samples-header {
    padding: 32px 48px 16px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .samples-header h2 {
    font-size: 13px;
    font-family: var(--mono);
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── MAIN GRID ── */
  main { padding: 0 48px 80px; }

  /* ── SAMPLE BLOCK ── */
  .sample-block {
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .sample-block.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .sample-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-bottom: 14px;
    padding-left: 2px;
  }
  .sample-label strong {
    color: var(--accent);
    font-size: 13px;
  }

  /* 6-column grid of cards */
  .cards-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  /* colour accent bar per method */
  .card-bar {
    height: 3px;
    flex-shrink: 0;
  }

  .card-mel {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
    background: #0d0d18;
  }

  .card-body {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card-method {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  audio {
    width: 100%;
    height: 28px;
    accent-color: var(--accent);
  }
  audio::-webkit-media-controls-panel { background: var(--surface); }

  /* divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 56px;
  }

  /* ── FOOTER ── */
  footer {
    padding: 32px 48px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1200px) {
    .cards-row { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 700px) {
    header, .legend, main, .samples-header, footer { padding-left: 20px; padding-right: 20px; }
    .cards-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 440px) {
    .cards-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <p class="header-tag">Audio Super-Resolution · Demo Page</p>
  <h1>Bandwidth Extension<br><span>Comparison</span></h1>
  <p class="header-desc">
    Each sample is processed by six systems. Mel spectrograms are shown above each audio player.
    All methods are evaluated against the same ground truth recording.
  </p>
</header>

<!-- ── LEGEND ── -->
<div class="legend" id="legend"></div>

<!-- ── SAMPLES ── -->
<div class="samples-header">
  <h2>40 Test Samples</h2>
</div>

<main id="main"></main>

<footer>
  <span>Audio Super-Resolution Demo</span>
  <span>40 samples · 6 methods</span>
</footer>

<script>
// ─────────────────────────────────────────────────────
// FILE LISTS  (preserve exact order — index alignment matters)
// ─────────────────────────────────────────────────────

const METHODS = [
  {
    key:     "Ground_Truth",
    label:   "Ground Truth",
    color:   "#7c6af7",
    wavDir:  "Ground_Truth",
    melDir:  "Ground_Truth_Mel",
  },
  {
    key:     "A2SB_ECT",
    label:   "A2SB-ECT",
    color:   "#f76a8a",
    wavDir:  "A2SB-ECT/Recon",
    melDir:  "A2SB-ECT/Mel",
  },
  {
    key:     "A2SB_1Split",
    label:   "A2SB 1-Split",
    color:   "#6af7c8",
    wavDir:  "A2SB_1Split/Recon",
    melDir:  "A2SB_1Split/Mel",
  },
  {
    key:     "A2SB_2Split",
    label:   "A2SB 2-Split",
    color:   "#f7c26a",
    wavDir:  "A2SB_2Split/Recon",
    melDir:  "A2SB_2Split/Mel",
  },
  {
    key:     "AudioSR",
    label:   "AudioSR",
    color:   "#6ab8f7",
    wavDir:  "AudioSR",
    melDir:  "AudioSR_Mel",
  },
  {
    key:     "UniverSR",
    label:   "UniverSR",
    color:   "#c26af7",
    wavDir:  "UniverSR",
    melDir:  "UniverSR_Mel",
  },
];

// Ground Truth wav files — defines the canonical order of 40 samples
const GT_WAV_FILES = [
  "datasets_tiny_set_[cel][pop_roc]0006__1.wav",
  "datasets_tiny_set_[cla][jaz_blu]0210__2.wav",
  "datasets_tiny_set_[gac][cla]0563__2.wav",
  "datasets_tiny_set_[gac][cla]0582__1.wav",
  "datasets_tiny_set_[gel][cla]0901__1.wav",
  "datasets_tiny_set_[gel][pop_roc]1018__3.wav",
  "datasets_tiny_set_[org][pop_roc]1079__2.wav",
  "datasets_tiny_set_[pia][jaz_blu]1506__3.wav",
  "datasets_tiny_set_[pia][pop_roc]1335__2.wav",
  "datasets_tiny_set_[sax][cla]1591__3.wav",
  "datasets_tiny_set_[sax][pop_roc]1620__1.wav",
  "datasets_tiny_set_[tru][cla]1881__2.wav",
  "datasets_tiny_set_[tru][cla]2012__3.wav",
  "datasets_tiny_set_[tru][jaz_blu]2022__2.wav",
  "datasets_tiny_set_[vio][cla]2138__3.wav",
  "datasets_tiny_set_[vio][pop_roc]2245__1.wav",
  "datasets_tiny_set_004066.wav",
  "datasets_tiny_set_012060.wav",
  "datasets_tiny_set_018037.wav",
  "datasets_tiny_set_021676.wav",
  "datasets_tiny_set_040233.wav",
  "datasets_tiny_set_042138.wav",
  "datasets_tiny_set_044__[gel][dru][pop_roc]0951__2.wav",
  "datasets_tiny_set_050446.wav",
  "datasets_tiny_set_063292.wav",
  "datasets_tiny_set_080765.wav",
  "datasets_tiny_set_083791.wav",
  "datasets_tiny_set_083898.wav",
  "datasets_tiny_set_089376.wav",
  "datasets_tiny_set_096627.wav",
  "datasets_tiny_set_115697.wav",
  "datasets_tiny_set_125289.wav",
  "datasets_tiny_set_125816.wav",
  "datasets_tiny_set_131934.wav",
  "datasets_tiny_set_134941.wav",
  "datasets_tiny_set_135374.wav",
  "datasets_tiny_set_145549.wav",
  "datasets_tiny_set_159__[flu][nod][cou_fol]0412__1.wav",
  "datasets_tiny_set_233__[gel][nod][jaz_blu]1124__3.wav",
  "datasets_tiny_set_238__[voi][nod][cou_fol]2418__2.wav",
];

// Per-method wav lists in the SAME order as GT_WAV_FILES
// (stems match across folders; only prefixes / suffixes differ)

const METHOD_WAV = {
  Ground_Truth: GT_WAV_FILES.slice(),   // identical

  A2SB_ECT: GT_WAV_FILES.slice(),       // same filenames under A2SB-ECT/Recon

  A2SB_1Split: GT_WAV_FILES.slice(),    // same under A2SB_1Split/Recon

  A2SB_2Split: GT_WAV_FILES.slice(),    // same under A2SB_2Split/Recon

  // AudioSR: same stem but with "_AudioSR_Processed_48K" suffix
  // Strip "datasets_tiny_set_" prefix and replace .wav
  AudioSR: GT_WAV_FILES.map(f => {
    const stem = f.replace(/^datasets_tiny_set_/, "").replace(/\.wav$/, "");
    return `${stem}_AudioSR_Processed_48K.wav`;
  }),

  // UniverSR: strip "datasets_tiny_set_" prefix
  UniverSR: GT_WAV_FILES.map(f => f.replace(/^datasets_tiny_set_/, "")),
};

// Mel PNGs follow the same stem logic, just .png extension
const METHOD_MEL = {
  Ground_Truth: GT_WAV_FILES.map(f => f.replace(/\.wav$/, ".png")),
  A2SB_ECT:     GT_WAV_FILES.map(f => f.replace(/\.wav$/, ".png")),
  A2SB_1Split:  GT_WAV_FILES.map(f => f.replace(/\.wav$/, ".png")),
  A2SB_2Split:  GT_WAV_FILES.map(f => f.replace(/\.wav$/, ".png")),
  AudioSR:      METHOD_WAV.AudioSR.map(f => f.replace(/\.wav$/, ".png")),
  UniverSR:     METHOD_WAV.UniverSR.map(f => f.replace(/\.wav$/, ".png")),
};

// ─────────────────────────────────────────────────────
// BUILD LEGEND
// ─────────────────────────────────────────────────────
const legendEl = document.getElementById("legend");
METHODS.forEach(m => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `<span class="legend-dot" style="background:${m.color}"></span>${m.label}`;
  legendEl.appendChild(item);
});

// ─────────────────────────────────────────────────────
// BUILD SAMPLE BLOCKS
// ─────────────────────────────────────────────────────
const mainEl = document.getElementById("main");

GT_WAV_FILES.forEach((gtFile, idx) => {
  // Derive a human-readable sample name from the filename
  const stem = gtFile.replace(/^datasets_tiny_set_/, "").replace(/\.wav$/, "");

  const block = document.createElement("div");
  block.className = "sample-block";

  const labelEl = document.createElement("p");
  labelEl.className = "sample-label";
  labelEl.innerHTML = `<strong>Sample ${String(idx + 1).padStart(2, "0")}</strong>&nbsp;&nbsp;${stem}`;
  block.appendChild(labelEl);

  const row = document.createElement("div");
  row.className = "cards-row";

  METHODS.forEach(method => {
    const wavFile = METHOD_WAV[method.key][idx];
    const melFile = METHOD_MEL[method.key][idx];
    const wavPath = `${method.wavDir}/${wavFile}`;
    const melPath = `${method.melDir}/${melFile}`;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-bar" style="background:${method.color}"></div>
      <img class="card-mel" src="${melPath}" alt="${method.label} mel spectrogram" loading="lazy" />
      <div class="card-body">
        <span class="card-method">${method.label}</span>
        <audio controls preload="none">
          <source src="${wavPath}" type="audio/wav" />
        </audio>
      </div>
    `;

    row.appendChild(card);
  });

  block.appendChild(row);
  mainEl.appendChild(block);

  // divider between samples (not after last)
  if (idx < GT_WAV_FILES.length - 1) {
    mainEl.appendChild(Object.assign(document.createElement("hr"), { className: "divider" }));
  }
});

// ─────────────────────────────────────────────────────
// SCROLL-REVEAL  (IntersectionObserver)
// ─────────────────────────────────────────────────────
const observer = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); observer.unobserve(e.target); } }),
  { threshold: 0.06 }
);
document.querySelectorAll(".sample-block").forEach((el, i) => {
  el.style.transitionDelay = `${Math.min(i * 0.03, 0.15)}s`;
  observer.observe(el);
});
</script>
</body>
</html>
